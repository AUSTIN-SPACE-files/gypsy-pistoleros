<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videos — Gypsy Pistoleros</title>
  <meta name="description" content="Every official Gypsy Pistoleros video, grouped by album. Dark Faerie Tales, Church of the Pistoleros, Duende a Go Go Loco! and more.">

  <!-- Google Fonts: Cinzel (nav/UI) + Cormorant Garamond (editorial italic) + Inter (body)
       Anton, Bebas Neue, Reenie Beanie also loaded for full type palette availability.
       BANDZOOGLE: add this link tag to Pages → Site-wide Settings → Headers & Metatags -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Web Awesome 3.7.0 — component and icon library
       BANDZOOGLE: these four tags also go into Pages → Site-wide Settings → Headers & Metatags -->
  <link rel="stylesheet" href="https://ka-f.webawesome.com/webawesome@3.7.0/styles/themes/default.css" />
  <link rel="stylesheet" href="https://ka-f.webawesome.com/webawesome@3.7.0/styles/native.css" />
  <link rel="stylesheet" href="https://ka-f.webawesome.com/webawesome@3.7.0/styles/utilities.css" />
  <script type="module" src="https://ka-f.webawesome.com/webawesome@3.7.0/webawesome.loader.js"></script>

  <!-- Font Awesome Pro Kit — unlocks Graphite, Duotone, Sharp, all Pro families -->
  <script src="https://kit.fontawesome.com/6a400036f2.js" crossorigin="anonymous"></script>

  <!-- v0 baseline stylesheet: variables, icons, typography, navigation, footer, reviews,
       homepage, press-kit, shows, videos. -->
  <link rel="stylesheet" href="../css/v0.css">
</head>
<body>

  <!--
    ═══════════════════════════════════════════════════════════
    BANDZOOGLE LAYOUT NOTE
    ═══════════════════════════════════════════════════════════
    Site-wide header, navigation, and footer are injected
    automatically by Bandzoogle via the site template.

    DO NOT add <header>, <nav>, or <footer> markup to this file.
    This file is a content block only — Bandzoogle wraps it.

    To update the nav or footer, edit the Bandzoogle template
    directly in Pages → Site-wide Settings.
    ═══════════════════════════════════════════════════════════
  -->

  <div class="page-content">

    <!-- ==========================================
         SECTION 1 — HERO
         ========================================== -->
    <section class="section-videos-hero section--rhythm-a" aria-label="Videos page header">
      <div class="section-videos-hero__inner">
        <h1 class="section-videos-hero__title">Videos</h1>
        <p class="section-videos-hero__tagline">Every official video, grouped by album. The whole damn carnival.</p>
      </div>
    </section>


    <!-- ==========================================
         SECTION 2 — VIDEO GALLERY
         ========================================== -->
    <section class="section-videos section--rhythm-b" aria-label="Video gallery">
      <div class="section-videos__inner">

        <!-- Videos renderer: reads data-videos-src → videos.json.
             Renders album sections with facade thumbnails.
             Click a facade to load the YouTube iframe. -->
        <div id="gp-videos" data-videos-src="https://gypsypistoleros.com/files/1413472/videos.json">
          <p class="video-loading">Loading videos…</p>
        </div>

      </div>
    </section>


    <!-- ==========================================
         SECTION 3 — CTA ROW
         ========================================== -->
    <section class="section-videos section--rhythm-a section-videos--cta-row" aria-label="More videos and tour dates">
      <div class="section-videos__inner section-videos__inner--cta-row">

        <wa-button variant="brand"
                   href="https://www.youtube.com/@OfficialGypsyPistoleros"
                   target="_blank"
                   rel="noopener">
          <i class="fa-brands fa-youtube" slot="prefix"></i>
          Subscribe on YouTube
        </wa-button>

        <wa-button variant="neutral"
                   href="/v0-shows-draft">
          See all shows
          <i class="fa-solid fa-arrow-right" slot="suffix"></i>
        </wa-button>

      </div>
    </section>

  </div><!-- /.page-content -->

  <!-- Videos renderer — loads data/videos.json and populates #gp-videos.
       BANDZOOGLE: host js/videos.js via Bandzoogle Files and update the src path. -->
  <script src="../js/videos.js" defer></script>

</body>
</html>
