<div class="page-content">

    <!-- ==========================================
         SECTION 1 — HERO
         ========================================== -->
<section class="section-hero section-hero--videos" aria-label="Videos">
  <div class="section-hero__content">
    <img class="section-hero__sigil"
         src="https://gypsypistoleros.com/files/1413427/gp-sigil.png"
         alt="Gypsy Pistoleros sigil"
         width="120"
         loading="eager">
    <h1 class="section-hero__title">Videos</h1>
    <p class="section-hero__tagline">
      <i class="fa-sharp fa-thin fa-film section-hero__tagline-icon"></i>
      <span>Every official video, grouped by album. The whole damn carnival.</span>
      <i class="fa-sharp fa-thin fa-circle-play section-hero__tagline-icon"></i>
    </p>
  </div>
  <div class="section-hero__fx"></div>
</section>


    <!-- ==========================================
         SECTION 2 — VIDEO GALLERY
         ========================================== -->
    <section class="section-videos section--rhythm-b" aria-label="Video gallery">
      <div class="section-videos__inner">

        <!-- Videos renderer: reads data-videos-src → videos.json.
             Renders album sections with facade thumbnails.
             Click a facade to load the YouTube iframe. -->
        <div id="gp-videos" data-videos-src="https://gypsypistoleros.com/files/1413472/videos.json">
          <p class="video-loading">Loading videos…</p>
        </div>

      </div>
    </section>


    <!-- ==========================================
         SECTION 3 — CTA ROW
         ========================================== -->
    <section class="section-videos section--rhythm-a section-videos--cta-row" aria-label="More videos and tour dates">
      <div class="section-videos__inner section-videos__inner--cta-row">

        <wa-button variant="brand"
                   href="https://www.youtube.com/@OfficialGypsyPistoleros"
                   target="_blank"
                   rel="noopener">
          <i class="fa-brands fa-youtube" slot="prefix"></i>
          Subscribe on YouTube
        </wa-button>

        <wa-button variant="neutral"
                   href="/v0-shows-draft">
          See all shows
          <i class="fa-sharp fa-thin fa-arrow-right" slot="suffix"></i>
        </wa-button>

      </div>
    </section>

  </div><!-- /.page-content -->
