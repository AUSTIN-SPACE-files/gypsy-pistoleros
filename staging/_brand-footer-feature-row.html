  the confirmed BZ slug once Kerry confirms it (likely /blog).

    .site-footer__inner       — two-zone flex row (footer.css)
    .site-footer__logo        — left logo column (footer.css)
    .site-footer__logo-img    — the vertical lockup img (footer.css)
    .site-footer__right       — right stacked zone (footer.css)
    .site-footer__nav         — footer nav element (footer.css)
    .footer-nav__list         — nav <ul> (footer.css)
    .footer-nav__link         — nav <a> (footer.css)
    .site-footer__social      — social icon row (footer.css)
    .footer-social-link       — individual social anchor (footer.css)
    .site-footer__baseline    — baseline row (footer.css)
    .site-footer__copyright   — copyright block (footer.css)
    .footer-copyright         — "© 2026..." line (footer.css)
    .footer-location          — "Worcester, est. MMXXVI" line (footer.css)
    .site-footer__credit      — AUSTIN_SPACE credit <p> (footer.css)
